<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>App_Remote — сессия</title>
<style>
:root { --bg:#0a0d13; --fg:#e6e9f0; --acc:#4f8cff; --ok:#3ecf8e; --warn:#f5b545; --err:#f0564f; }
* { box-sizing:border-box; }
body { margin:0; background:#000; color:var(--fg); font:13px "Segoe UI",system-ui,sans-serif; overflow:hidden; }
#stage { position:fixed; inset:0; background:#000; }
canvas#cv {
  width:100%; height:100%; display:block; object-fit:contain;
  outline:none; background:#000; cursor:none;
}
#toolbar {
  position:fixed; top:0; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; padding:6px 10px; background:rgba(14,17,23,.92);
  border:1px solid #2a3245; border-top:0; border-radius:0 0 10px 10px; z-index:20;
  transition:opacity .35s, transform .35s; align-items:center; justify-content:center;
  flex-wrap:wrap; width:max-content; max-width:98vw;
}
#toolbar.hidden { opacity:0; transform:translateX(-50%) translateY(-85%); }
#toolbar.hidden:hover, #toolbar:hover { opacity:1; transform:translateX(-50%); }
button, select {
  background:#1e2534; color:var(--fg); border:1px solid #2a3245;
  border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer;
}
button.acc { background:var(--acc); border-color:var(--acc); }
button.on { background:var(--ok); border-color:var(--ok); color:#06210f; }
button.danger { background:var(--err); border-color:var(--err); }
select option:disabled { color:#687086; }
#streamStatus { white-space:nowrap; max-width:250px; overflow:hidden; text-overflow:ellipsis; }
#overlay {
  position:fixed; top:10px; left:10px; z-index:15; min-width:250px;
  background:rgba(10,13,19,.85); border:1px solid #2a3245; border-radius:10px;
  padding:10px 14px; font:11.5px/1.55 Consolas,monospace; display:none;
}
#overlay .sec { color:#8b93a7; margin-top:6px; font-weight:700; }
#overlay .w { color:var(--warn); }
#overlay .e { color:var(--err); }
#overlay b { color:var(--acc); font-weight:600; }
#hint {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:22;
  background:rgba(14,17,23,.92); border:1px solid #2a3245; border-radius:8px;
  padding:6px 14px; font-size:12px; display:none; pointer-events:none;
}
#msg {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; z-index:30; background:var(--bg); text-align:center;
}
.badge { padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.b-ok { background:rgba(62,207,142,.15); color:var(--ok); }
.b-acc { background:rgba(79,140,255,.15); color:var(--acc); }
.b-warn { background:rgba(245,181,69,.15); color:var(--warn); }
dialog {
  width:min(680px,94vw); max-height:80vh; overflow:auto; padding:18px;
  color:var(--fg); background:#161b25; border:1px solid #2a3245; border-radius:8px;
}
dialog::backdrop { background:rgba(0,0,0,.7); }
.file-head { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:12px; }
.file-head h2 { margin:0; font-size:16px; }
.file-head .grow { flex:1; }
#fileTable { width:100%; border-collapse:collapse; }
#fileTable th, #fileTable td { padding:7px 8px; text-align:left; border-bottom:1px solid #2a3245; }
#fileTable th { color:#8b93a7; font-weight:500; }
#fileState { min-height:18px; margin-top:10px; color:#8b93a7; }
</style>
</head>
<body>
<div id="msg"><h2 id="msgText">Подключение…</h2><div id="msgSub" style="color:#8b93a7;max-width:480px"></div></div>
<div id="stage" style="display:none"><canvas id="cv" tabindex="0"></canvas></div>

<div id="toolbar" style="display:none">
  <button id="btnOverlay" class="acc" onclick="toggleOverlay()">📊 Оверлей</button>
  <select id="selProfile" onchange="applyProfile()" title="Профиль">
    <option value="office">Офис</option><option value="dev">Разработка</option>
    <option value="design">Дизайн</option><option value="video">Видео</option>
    <option value="game">Игры</option><option value="competitive">Соревн.</option>
    <option value="custom">Свой</option>
  </select>
  <select id="selFps" onchange="manualConfigChanged()" title="Частота передачи кадров"><option>15</option><option>30</option><option>60</option><option>90</option><option>120</option><option>144</option></select>
  <select id="selQ" onchange="manualConfigChanged()" title="Качество JPEG">
    <option value="40">Q40 · экономно</option><option value="55">Q55 · офис</option>
    <option value="60">Q60 · плавность</option><option value="70">Q70 · чётко</option>
    <option value="75">Q75 · видео</option><option value="80">Q80 · высокое</option>
    <option value="85">Q85 · очень высокое</option><option value="95">Q95 · максимум</option>
  </select>
  <select id="selRes" onchange="manualConfigChanged()" title="Разрешение потока"><option value="1">Разрешение…</option></select>
  <select id="selAdaptive" onchange="sendConfig()" title="Авто снижает параметры при проблемах сети; фиксированный режим сохраняет выбранные значения">
    <option value="auto">Авто</option><option value="fixed">Фикс.</option>
  </select>
  <span id="streamStatus" class="badge b-acc" title="Параметры потока">Ожидание хоста…</span>
  <button id="btnInput" onclick="toggleInput()">⌨️ Ввод: вкл</button>
  <button id="btnKeys" onclick="toggleKeyMode()" title="Текст: печатает символы как есть (любая раскладка, точки, кириллица). Игра: клавиши как физические кнопки (WASD с удержанием).">⌨️ Набор: текст</button>
  <button id="btnCapture" onclick="toggleCaptureMode()" title="Захват мыши: курсор не выходит за окно и не задевает меню/док Mac. Выход: удерживайте Esc.">🔒 Захват</button>
  <button id="btnMac" onclick="toggleMac()" title="Раскладка Mac→Windows: клавиша ⌘ (Cmd) работает как Ctrl (⌘C = копировать и т.п.)">⌘→Ctrl</button>
  <button onclick="langSwitch()" title="Переключить язык ввода НА ХОСТЕ (Win+Space). Для набора текста обычно не нужно — печатайте в своей раскладке.">🌐</button>
  <button onclick="clipSend()" id="btnClipS" title="Отправить буфер обмена на хост">📋→</button>
  <button onclick="clipGet()" id="btnClipG" title="Получить буфер обмена хоста">→📋</button>
  <button onclick="openFiles()" id="btnFiles" title="Личные файлы на хосте" style="display:none">📁 Файлы</button>
  <button id="btnFs" onclick="toggleFs()" title="Полноэкранный режим">⛶</button>
  <button class="danger" onclick="disconnect()">✕ Отключиться</button>
</div>

<div id="hint"></div>
<div id="overlay"></div>

<dialog id="dlgFiles">
  <div class="file-head">
    <h2>Личные файлы</h2>
    <span id="fileUsage" class="badge b-acc">—</span>
    <span class="grow"></span>
    <button onclick="dlgFiles.close()">Закрыть</button>
  </div>
  <div class="file-head">
    <input id="fileInput" type="file">
    <button id="btnUpload" class="acc" onclick="uploadFile()">Загрузить</button>
    <button onclick="loadFiles()">Обновить</button>
  </div>
  <table id="fileTable">
    <thead><tr><th>Имя</th><th>Размер</th><th>Изменён</th><th></th></tr></thead>
    <tbody></tbody>
  </table>
  <div id="fileState"></div>
</dialog>

<script>
const P = new URLSearchParams(location.search);
const SECRET = new URLSearchParams(location.hash.slice(1));
const HOST = P.get('host'), PORT = P.get('port'), TOKEN = SECRET.get('token');
if (location.hash) history.replaceState(null, '', location.pathname + location.search);
const $ = s => document.querySelector(s);
const esc = value => String(value ?? '').replace(/[&<>"']/g, ch => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
})[ch]);
const cv = $('#cv'), ctx = cv.getContext('2d');
const base = document.createElement('canvas');       // содержимое экрана хоста
const bctx = base.getContext('2d');
const toolbar = $('#toolbar');
const clamp = v => v < 0 ? 0 : v > 1 ? 1 : v;

const IS_MAC = /Mac|iPhone|iPad/i.test(navigator.platform || '')
  || /Mac/i.test((navigator.userAgentData && navigator.userAgentData.platform) || '');

let ws, hello = null, lastStats = null, streamState = null;
let configSeq = 0, lastConfigAck = 0;
let inputEnabled = true, overlayOn = true;
let permissions = {input:false, clipboard:false, files:false};
let captureMode = IS_MAC;   // клик по экрану захватывает мышь (актуально для Mac)
let captured = false;       // сейчас Pointer Lock активен
let macKeys = IS_MAC;       // Cmd -> Ctrl
let keyMode = 'text';       // 'text' — Unicode-набор; 'game' — физические клавиши

// курсор
let hostCursorType = 'default', hostCursorVisible = true, hostCursorPos = {x:0, y:0};
let vx = 0.5, vy = 0.5;     // виртуальная позиция курсора при захвате (0..1)
let localMouse = {x: 0, y: 0}, localOver = false;   // реальная мышь (оконный режим)

// метрики клиента
let frames = 0, fpsShown = 0, bytesAcc = 0, bitrate = 0;
let deltaCnt = 0, fullCnt = 0;
let rtts = [], ping = 0, jitter = 0;
let decodeMs = 0, frameGapMs = 0, lastFrameT = 0;
let framesDropped = 0;

function ensureSelectValue(select, value, label) {
  const stringValue = String(value);
  let option = [...select.options].find(item => item.value === stringValue);
  if (!option) {
    option = document.createElement('option');
    option.value = stringValue; option.textContent = label || stringValue;
    select.appendChild(option);
  }
  select.value = stringValue;
}
ensureSelectValue($('#selFps'), P.get('fps') || '60');
ensureSelectValue($('#selQ'), P.get('quality') || '70', `Q${P.get('quality')}`);
$('#selProfile').value = P.get('profile') || 'dev';
$('#selAdaptive').value = P.get('adaptive') === '0' ? 'fixed' : 'auto';

// ================== КУРСОР: рисуется ПРЯМО В CANVAS ==================
// Никаких DOM-слоёв: курсор компонуется с кадром при отрисовке, поэтому он
// не может пропасть из-за z-index/fullscreen/pointer-lock причуд браузера.
const CURSOR_SVGS = {
  'default':     {hx:2,  hy:2,  w:20, h:24, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="20" height="24" viewBox="0 0 20 24"><path d="M2 2 L2 18 L6 14.5 L8.8 20.5 L11.4 19.3 L8.7 13.6 L13.5 13.6 Z" fill="#fff" stroke="#111" stroke-width="1.3" stroke-linejoin="round"/></svg>'},
  'text':        {hx:7,  hy:13, w:14, h:26, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="14" height="26" viewBox="0 0 14 26"><g fill="none" stroke-linecap="round"><path d="M7 3 V23 M4 3 H10 M4 23 H10" stroke="#111" stroke-width="3.6"/><path d="M7 3 V23 M4 3 H10 M4 23 H10" stroke="#fff" stroke-width="1.6"/></g></svg>'},
  'pointer':     {hx:9,  hy:3,  w:24, h:28, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="28" viewBox="0 0 24 28"><path d="M8 3 c-1.1 0-1.9 .9-1.9 2 V13 L4.7 12 c-.9-.7-2.2-.5-2.2 .8 0 .5 .2 .9 .6 1.3 l3.7 4.4 c1.1 1.4 2.3 2.3 4.5 2.3 h3 c2.1 0 3.6-1.5 3.6-3.6 V10 c0-.9-.7-1.6-1.6-1.6 -.3 0-.5 .1-.8 .2 -.1-.8-.7-1.4-1.6-1.4 -.4 0-.7 .1-1 .3 -.2-.8-.8-1.3-1.6-1.3 -.3 0-.6 .1-.9 .2 V5 C9.9 3.9 9.1 3 8 3 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'move':        {hx:14, hy:14, w:28, h:28, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28"><path d="M14 2 L18 6 H15.2 V12.8 H22 V10 L26 14 L22 18 V15.2 H15.2 V22 H18 L14 26 L10 22 H12.8 V15.2 H6 V18 L2 14 L6 10 V12.8 H12.8 V6 H10 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'ew-resize':   {hx:14, hy:7,  w:28, h:14, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="28" height="14" viewBox="0 0 28 14"><path d="M7 3 L2 7 L7 11 V8 H21 V11 L26 7 L21 3 V6 H7 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'ns-resize':   {hx:7,  hy:14, w:14, h:28, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="14" height="28" viewBox="0 0 14 28"><path d="M3 7 L7 2 L11 7 H8 V21 H11 L7 26 L3 21 H6 V7 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'nwse-resize': {hx:12, hy:12, w:24, h:24, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M4 4 H12 L9.2 6.8 L17.2 14.8 L20 12 V20 H12 L14.8 17.2 L6.8 9.2 L4 12 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'nesw-resize': {hx:12, hy:12, w:24, h:24, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path d="M20 4 H12 L14.8 6.8 L6.8 14.8 L4 12 V20 H12 L9.2 17.2 L17.2 9.2 L20 12 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'crosshair':   {hx:12, hy:12, w:24, h:24, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke-linecap="round"><path d="M12 2 V22 M2 12 H22" stroke="#111" stroke-width="3.4"/><path d="M12 2 V22 M2 12 H22" stroke="#fff" stroke-width="1.4"/></g></svg>'},
  'not-allowed': {hx:12, hy:12, w:24, h:24, svg:'<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><g fill="none"><circle cx="12" cy="12" r="9" stroke="#111" stroke-width="4.5"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="#111" stroke-width="4.5"/><circle cx="12" cy="12" r="9" stroke="#f0564f" stroke-width="2.6"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="#f0564f" stroke-width="2.6"/></g></svg>'},
};
const cursorImgs = {};
for (const [type, c] of Object.entries(CURSOR_SVGS)) {
  const img = new Image();
  img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(c.svg);
  cursorImgs[type] = img;
}
function nativeWH() { return (hello && hello.screen) || [cv.width || 1, cv.height || 1]; }
function contentRect() {
  const r = cv.getBoundingClientRect();
  if (!cv.width || !cv.height || !r.width || !r.height) return {x:r.left, y:r.top, w:r.width||1, h:r.height||1};
  const ar = cv.width / cv.height, rr = r.width / r.height;
  if (rr > ar) { const h = r.height, w = h * ar; return {x: r.left + (r.width - w) / 2, y: r.top, w, h}; }
  const w = r.width, h = w / ar; return {x: r.left, y: r.top + (r.height - h) / 2, w, h};
}
// Позиция курсора в ПИКСЕЛЯХ CANVAS + видимость (по режиму)
function cursorState() {
  if (!cv.width) return {show:false, px:0, py:0};
  if (captured) return {show:true, px: vx * cv.width, py: vy * cv.height};
  if (inputEnabled) {
    if (!localOver) return {show:false, px:0, py:0};
    const c = contentRect();
    return {show:true,
            px: clamp((localMouse.x - c.x) / c.w) * cv.width,
            py: clamp((localMouse.y - c.y) / c.h) * cv.height};
  }
  const [nw, nh] = nativeWH();
  return {show: hostCursorVisible,
          px: clamp(hostCursorPos.x / nw) * cv.width,
          py: clamp(hostCursorPos.y / nh) * cv.height};
}
let dirty = false, lastDrawKey = '';
function renderLoop() {
  const st = cursorState();
  const blocked = !permissions.input || !inputEnabled;
  const key = [st.show, Math.round(st.px), Math.round(st.py), hostCursorType, blocked, captured].join('|');
  if ((dirty || key !== lastDrawKey) && cv.width && base.width) {
    ctx.drawImage(base, 0, 0);
    if (st.show) {
      const c = CURSOR_SVGS[hostCursorType] || CURSOR_SVGS['default'];
      const img = cursorImgs[hostCursorType] || cursorImgs['default'];
      // курсор всегда ~одного видимого размера: масштаб = px канваса на CSS px
      const cr = contentRect();
      const k = Math.max(0.6, Math.min(4, cv.width / cr.w));
      ctx.save();
      if (blocked && !captured) ctx.globalAlpha = 0.55;
      if (img.complete && img.naturalWidth) {
        ctx.drawImage(img, st.px - c.hx * k, st.py - c.hy * k, c.w * k, c.h * k);
      } else {   // фолбэк, пока SVG не декодировался: простая стрелка
        ctx.beginPath();
        ctx.moveTo(st.px, st.py); ctx.lineTo(st.px, st.py + 16 * k);
        ctx.lineTo(st.px + 11 * k, st.py + 11 * k); ctx.closePath();
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#111'; ctx.lineWidth = k;
        ctx.fill(); ctx.stroke();
      }
      ctx.restore();
    }
    lastDrawKey = key; dirty = false;
  }
  requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// ================== ПОТОК: дельта-кадры ==================
// Бинарное сообщение: [0xA7, ver, kind(0=full,1=delta), 0, x:u16, y:u16,
// fw:u16, fh:u16] (little-endian) + JPEG. Дельта рисуется поверх base в (x,y).
function connect() {
  ws = new WebSocket(`ws://${HOST}:${PORT}/ws/stream?token=${encodeURIComponent(TOKEN)}`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => setStreamStatus(null, true);
  ws.onmessage = onMsg;
  ws.onclose = e => showMsg('Сессия завершена', e.reason || 'Соединение закрыто хостом');
  ws.onerror = () => showMsg('Ошибка подключения',
    'Проверьте, что хост запущен, доступен по сети и брандмауэр разрешает порт ' + PORT);
}

function showMsg(t, sub) {
  $('#msg').style.display = ''; $('#stage').style.display = 'none';
  toolbar.style.display = 'none';
  $('#msgText').textContent = t; $('#msgSub').textContent = sub || '';
}
let hintTimer = null;
function hint(text, ttl) {
  const h = $('#hint');
  clearTimeout(hintTimer);
  if (!text) { h.style.display = 'none'; return; }
  h.textContent = text; h.style.display = 'block';
  if (ttl) hintTimer = setTimeout(() => { h.style.display = 'none'; }, ttl);
}

// Очередь кадров: дельты терять нельзя (каждая строится на предыдущей).
// Если декодер безнадёжно отстал — очищаем очередь и просим полный кадр.
let frameQueue = [], decoding = false;
function onMsg(e) {
  if (typeof e.data === 'string') { onText(JSON.parse(e.data)); return; }
  bytesAcc += e.data.byteLength;
  const dv = new DataView(e.data);
  let item;
  if (e.data.byteLength > 12 && dv.getUint8(0) === 0xA7 && dv.getUint8(1) === 1) {
    item = {kind: dv.getUint8(2), x: dv.getUint16(4, true), y: dv.getUint16(6, true),
            fw: dv.getUint16(8, true), fh: dv.getUint16(10, true),
            buf: e.data.slice(12)};
  } else {
    item = {kind: 0, x: 0, y: 0, fw: 0, fh: 0, buf: e.data};   // legacy: целый JPEG
  }
  frameQueue.push(item);
  if (frameQueue.length > 8) {          // декодер не успевает — начать заново
    framesDropped += frameQueue.length;
    frameQueue = [];
    if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'refresh'}));
    return;
  }
  if (!decoding) drainFrames();
}
async function drainFrames() {
  decoding = true;
  while (frameQueue.length) {
    const f = frameQueue.shift();
    const t0 = performance.now();
    try {
      const bmp = await createImageBitmap(new Blob([f.buf], {type:'image/jpeg'}));
      const fw = f.fw || bmp.width, fh = f.fh || bmp.height;
      if (base.width !== fw || base.height !== fh) {
        base.width = fw; base.height = fh;
        cv.width = fw; cv.height = fh;
        if (f.kind === 1) {   // дельта при несовпадении размера — нужен полный
          bmp.close();
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'refresh'}));
          continue;
        }
      }
      bctx.drawImage(bmp, f.x, f.y);
      bmp.close();
      if (f.kind === 1) deltaCnt++; else fullCnt++;
      dirty = true;
      decodeMs = performance.now() - t0;
      if (lastFrameT) frameGapMs = t0 - lastFrameT;
      lastFrameT = t0;
      frames++;
    } catch(_) { framesDropped++; }
  }
  decoding = false;
}

async function onText(d) {
  if (d.type === 'hello') {
    hello = d;
    applyHostLimits(d.limits || (d.stream && d.stream.limits));
    applyPermissions(d.permissions || {});
    document.title = `App_Remote — ${d.host_name}`;
    $('#msg').style.display = 'none';
    $('#stage').style.display = ''; toolbar.style.display = 'flex';
    $('#btnClipS').style.display = permissions.clipboard ? '' : 'none';
    $('#btnClipG').style.display = permissions.clipboard ? '' : 'none';
    keyMode = ($('#selProfile').value === 'game' || $('#selProfile').value === 'competitive') ? 'game' : 'text';
    updateCaptureButton(); updateMacButton(); updateKeysButton();
    buildResSelect();
    cv.focus();
    pokeToolbar();
    renderOverlay();
    if (captureMode && permissions.input) {
      hint('Кликните по экрану — мышь захватится (полный экран). Выход: удерживайте Esc.', 6000);
    }
  } else if (d.type === 'config_applied') {
    const requestId = Number(d.request_id) || 0;
    if (!requestId || requestId >= lastConfigAck) {
      lastConfigAck = requestId;
      applyStreamState(d, true);
    }
  } else if (d.type === 'pong') {
    const rtt = performance.now() - d.t;
    rtts.push(rtt); if (rtts.length > 20) rtts.shift();
    ping = rtts.reduce((a,b)=>a+b,0) / rtts.length;
    const mean = ping;
    jitter = Math.sqrt(rtts.reduce((a,b)=>a+(b-mean)**2,0) / rtts.length);
  } else if (d.type === 'stats') {
    lastStats = d;
    if (d.permissions) applyPermissions(d.permissions);
    if (d.stream) applyStreamState(d.stream, false);
    else applyStreamState({
      selected: (d.session && d.session.requested) || {
        fps:+$('#selFps').value, quality:+$('#selQ').value,
        scale:+$('#selRes').value || 1,
        adaptive:$('#selAdaptive').value === 'auto', profile:$('#selProfile').value},
      applied:{fps:d.fps_target, quality:d.quality, scale:d.scale}, reasons:[]
    }, false);
  } else if (d.type === 'cursor') {
    const c = d.cursor || {};
    if (c.type) hostCursorType = c.type;
    if (typeof c.x === 'number') { hostCursorPos.x = c.x; hostCursorPos.y = c.y; }
    hostCursorVisible = c.visible !== false;
  } else if (d.type === 'clipboard') {
    try { await navigator.clipboard.writeText(d.text); } catch(_){}
  } else if (d.type === 'kick') {
    showMsg('Сессия завершена', d.reason);
  }
}

// ------- выбор разрешения потока (по родному разрешению хоста)
const RES_LIST = [[3840,2160],[2560,1440],[2048,1152],[1920,1080],[1600,900],[1366,768],[1280,720]];
function streamDimensions(scale) {
  const [nw, nh] = nativeWH();
  const value = Math.max(0.25, Math.min(1, Number(scale) || 1));
  return [Math.max(2, Math.floor(nw * value / 2) * 2),
          Math.max(2, Math.floor(nh * value / 2) * 2)];
}
function findScaleOption(scale) {
  return [...$('#selRes').options].find(option =>
    Math.abs(Number(option.value) - Number(scale)) < 0.00001);
}
function addScaleOption(scale, prefix='') {
  const value = Math.max(0.25, Math.min(1, Number(scale) || 1));
  let option = findScaleOption(value);
  if (option) return option;
  const [w, h] = streamDimensions(value);
  option = document.createElement('option');
  option.value = value.toFixed(6);
  option.textContent = `${prefix}${w}×${h}`;
  $('#selRes').appendChild(option);
  return option;
}
function selectScale(scale) {
  const option = findScaleOption(scale) || addScaleOption(scale);
  $('#selRes').value = option.value;
}
function applyHostLimits(limits) {
  if (!limits) return;
  const maxFps = Number(limits.max_fps) || 240;
  for (const option of $('#selFps').options) {
    option.disabled = Number(option.value) > maxFps;
    option.title = option.disabled ? `Лимит учётной записи: ${maxFps} FPS` : '';
  }
  $('#selFps').title = `Частота передачи кадров. Лимит учётной записи: ${maxFps} FPS`;
}
function setStreamStatus(state, pending=false) {
  const badge = $('#streamStatus');
  if (pending) {
    badge.textContent = 'Применяю…'; badge.className = 'badge b-acc';
    badge.title = 'Хост применяет параметры потока'; return;
  }
  if (!state || !state.applied) return;
  const applied = state.applied;
  const [w, h] = streamDimensions(applied.scale);
  const reasons = state.reasons || [];
  badge.textContent = `${w}×${h} · ${applied.fps} FPS · Q${applied.quality}`;
  badge.className = `badge ${reasons.length ? 'b-warn' : 'b-ok'}`;
  badge.title = reasons.length ? reasons.join('\n') : 'Хост подтвердил эти параметры';
}
function applyStreamState(state, announce) {
  if (!state) return;
  streamState = state;
  applyHostLimits(state.limits);
  const selected = state.selected || {};
  if (selected.fps != null) ensureSelectValue($('#selFps'), selected.fps);
  if (selected.quality != null) ensureSelectValue($('#selQ'), selected.quality, `Q${selected.quality}`);
  if (selected.scale != null) selectScale(selected.scale);
  if (selected.profile) $('#selProfile').value = selected.profile;
  if (typeof selected.adaptive === 'boolean') {
    $('#selAdaptive').value = selected.adaptive ? 'auto' : 'fixed';
  }
  setStreamStatus(state, false);
  if (announce && state.reasons && state.reasons.length) hint(state.reasons.join('. '), 6000);
  if (overlayOn) renderOverlay();
}
function buildResSelect() {
  const sel = $('#selRes');
  const [nw, nh] = nativeWH();
  sel.innerHTML = '';
  const add = (label, val) => {
    if (findScaleOption(val)) return findScaleOption(val);
    const o = document.createElement('option');
    o.textContent = label; o.value = Number(val).toFixed(6); sel.appendChild(o);
    return o;
  };
  add(`Родное хоста ${nw}×${nh}`, '1');
  // Подбираем поток под физическую высоту экрана клиента, сохраняя пропорции хоста.
  const dpr = window.devicePixelRatio || 1;
  const clientH = Math.round(screen.height * dpr);
  if (clientH && nh) {
    const scale = Math.max(0.25, Math.min(1, clientH / nh));
    const [w, h] = streamDimensions(scale);
    add(`Под мой экран ${w}×${h}${scale >= 1 ? ' · макс' : ''}`, scale);
  }
  for (const [, h] of RES_LIST) {
    if (!nh || h >= nh) continue;
    const scale = h / nh;
    if (scale < 0.25) continue;
    const [w, actualH] = streamDimensions(scale);
    add(`${w}×${actualH}`, scale);
  }
  const want = P.get('scale') || 'auto';
  if (want === 'auto') {
    // дельта-кадры сильно снижают трафик, но полные кадры 1440p/4K всё ещё
    // тяжёлые — для плавности стартуем с 1080p
    let option = findScaleOption(1);
    if (nh > 1200) {
      const match = [...sel.options].find(item => /×1080(?:\D|$)/.test(item.textContent));
      if (match) { option = match; hint('Разрешение потока: 1080p для плавности. Родное — в панели сверху.', 6000); }
    }
    sel.value = option.value;
  } else {
    selectScale(want);
  }
  sendConfig();
}

// -------- захват мыши --------
// Захват = полный экран + Pointer Lock + Keyboard Lock. Полный экран нужен,
// чтобы Keyboard Lock отдавал Esc НА ХОСТ (а не сбрасывал захват) — приём
// браузерных клиентов облачного гейминга. Тап по Esc уходит в Windows; выход —
// УДЕРЖАТЬ Esc или кнопка «Захват». Без Keyboard Lock (Safari) Esc снимает
// захват, следующий клик возвращает.
let kbLocked = false, kbSupported = !!(navigator.keyboard && navigator.keyboard.lock);
function kbLock() {
  if (kbLocked || !kbSupported) return;
  try { navigator.keyboard.lock(['Escape']); kbLocked = true; } catch(_) {}
}
function kbUnlock() {
  if (kbLocked) { try { navigator.keyboard.unlock(); } catch(_) {} }
  kbLocked = false;
}
function requestPL() {
  if (document.pointerLockElement === cv) return;
  const [nw, nh] = nativeWH();
  vx = clamp(hostCursorPos.x / nw); vy = clamp(hostCursorPos.y / nh);  // старт без скачка
  try {
    const p = cv.requestPointerLock({unadjustedMovement: true});   // без ускорения ОС
    if (p && p.catch) p.catch(() => { try { cv.requestPointerLock(); } catch(_){} });
  } catch(_) { try { cv.requestPointerLock(); } catch(_){} }
}
function toggleCaptureMode() {
  captureMode = !captureMode;
  updateCaptureButton();
  if (captureMode && permissions.input && inputEnabled) enterCapture();
  else exitCapture();
}
function enterCapture() {
  if (!permissions.input || !inputEnabled || !cv.requestPointerLock) return;
  captureMode = true; updateCaptureButton();
  if (!document.fullscreenElement) {
    // после входа в полный экран fullscreenchange сам возьмёт keyboard+pointer lock
    document.documentElement.requestFullscreen().catch(() => requestPL());
  } else {
    kbLock(); requestPL();
  }
}
function exitCapture() {
  kbUnlock();
  if (document.pointerLockElement === cv && document.exitPointerLock) document.exitPointerLock();
  if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(()=>{});
}
document.addEventListener('fullscreenchange', () => {
  if (document.fullscreenElement) {
    if (captureMode && permissions.input && inputEnabled) { kbLock(); setTimeout(requestPL, 40); }
  } else {
    // вышли из полного экрана (удержание Esc / ⛶) — полностью снимаем захват
    kbUnlock();
    if (document.pointerLockElement === cv) document.exitPointerLock();
  }
});
document.addEventListener('pointerlockchange', () => {
  captured = document.pointerLockElement === cv;
  if (captured) {
    releaseAll();
    toolbar.classList.add('hidden');
    hint(kbLocked ? 'Захвачено · Esc уходит в Windows · удерживайте Esc для выхода'
                  : 'Захвачено · Esc уходит в Windows · кнопка «Захват» — выход', 3500);
  } else {
    releaseAll(); pokeToolbar();

  dirty = true;
});
document.addEventListener('pointerlockerror', () => {

// -------- ввод --------
// Клики и клавиши уходят немедленно (без +16 мс задержки), движения мыши
// коалесцируются и уходят каждые ~8 мс.
let evQueue = [];
function flushNow() {
  if (!evQueue.length) return;
  if (!ws || ws.readyState !== 1 || !inputEnabled) { evQueue = []; return; }
  ws.send(JSON.stringify({type:'input', events: evQueue}));
  evQueue = [];
}
setInterval(flushNow, 8);

function pushMove(x, y) {
  const last = evQueue[evQueue.length - 1];
  if (last && last.t === 'mm') { last.x = x; last.y = y; }
  else evQueue.push({t:'mm', x, y});
}
function insideContent(e) {
  const c = contentRect();
  return e.clientX >= c.x && e.clientX <= c.x + c.w && e.clientY >= c.y && e.clientY <= c.y + c.h;
}
function normAbs(e) {
  const c = contentRect();
  return {x: clamp((e.clientX - c.x) / c.w), y: clamp((e.clientY - c.y) / c.h)};
}

cv.addEventListener('mousemove', e => {
  if (captured) {
    const c = contentRect();
    vx = clamp(vx + e.movementX / c.w);
    vy = clamp(vy + e.movementY / c.h);
    if (inputEnabled) pushMove(vx, vy);
  } else if (inputEnabled) {
    localMouse.x = e.clientX; localMouse.y = e.clientY;
    localOver = insideContent(e);
    if (localOver) { const p = normAbs(e); pushMove(p.x, p.y); }
  }
});
cv.addEventListener('mouseleave', () => { if (!captured) localOver = false; });
cv.addEventListener('mousedown', e => {
  e.preventDefault(); cv.focus();
  if (captureMode && !captured && permissions.input && inputEnabled) {
    enterCapture();          // первый клик только захватывает мышь, не кликает
    return;
  }
  if (inputEnabled) {
    if (!captured && insideContent(e)) { const p = normAbs(e); pushMove(p.x, p.y); }
    evQueue.push({t:'mb', b:e.button, d:1});
    flushNow();
  }
});
cv.addEventListener('mouseup', e => {
  e.preventDefault();
  if (inputEnabled) { evQueue.push({t:'mb', b:e.button, d:0}); flushNow(); }
});
cv.addEventListener('auxclick', e => e.preventDefault());
cv.addEventListener('contextmenu', e => e.preventDefault());

// колесо: копим дробные дельты (трекпад Mac шлёт мелкие) по обеим осям
let wheelX = 0, wheelY = 0;
cv.addEventListener('wheel', e => {
  e.preventDefault();
  if (!inputEnabled) return;
  let dy = e.deltaY, dx = e.deltaX;
  if (e.deltaMode === 1) { dy *= 16; dx *= 16; }
  else if (e.deltaMode === 2) { dy *= cv.height || 600; dx *= cv.width || 800; }
  wheelY += dy; wheelX += dx;
  const sy = Math.trunc(wheelY / 40), sx = Math.trunc(wheelX / 40);
  if (sy) wheelY -= sy * 40;
  if (sx) wheelX -= sx * 40;
  if (sy || sx) evQueue.push({t:'wh', dy: sy * 100, dx: sx * 100});
}, {passive:false});

// -------- клавиатура --------
// Режим «текст»: печатаемые символы уходят КАК ЕСТЬ (Unicode) — точка,
// кириллица, любые символы работают при любой раскладке клиента и хоста.
// Язык набора переключается на ВАШЕМ устройстве, раскладку хоста трогать
// не нужно. Режим «игра»: клавиши идут как физические кнопки (WASD и т.д.).
const pressed = new Set();
const CODE_CHAR = {Period:'.', Comma:',', Slash:'/', Backslash:'\\', Semicolon:';',
  Quote:"'", BracketLeft:'[', BracketRight:']', Backquote:'`', Minus:'-', Equal:'=', Space:' '};
function physicalChar(e) {
  const c = e.code || '';
  if (c.startsWith('Key')) return c.slice(3).toLowerCase();
  if (c.startsWith('Digit')) return c.slice(5);
  if (c.startsWith('Numpad') && c.length === 7) return c.slice(6);
  return CODE_CHAR[c] || null;
}
function mapKeyName(e) {
  let k = e.key;
  if (macKeys && k === 'Meta') return 'Control';   // Cmd -> Ctrl
  return k;
}
function releaseAll() {
  for (const k of pressed) evQueue.push({t:'kb', k, d:0});
  pressed.clear();
  flushNow();
}
function isChord(e) {
  // Option на Mac — часть набора символов (Option+буква = спецсимвол), не шорткат
  return e.ctrlKey || e.metaKey || (e.altKey && !IS_MAC);
}
cv.addEventListener('keydown', e => {
  if (!inputEnabled) return;
  // Esc НЕ гасим — он уходит на хост (в Windows). Выход из захвата —
  // удержанием Esc (Keyboard Lock сам выйдет из полного экрана) или кнопкой.
  e.preventDefault();
  const single = e.key.length === 1;
  if (single && !isChord(e) && keyMode === 'text') {
    evQueue.push({t:'txt', s: e.key});          // Unicode-набор: любой символ
    flushNow();
    return;
  }
  if (e.key === 'Dead') return;                 // dead-key: ждём готового символа
  const k = single ? (physicalChar(e) || e.key) : mapKeyName(e);
  if (macKeys && e.metaKey && e.key !== 'Meta') {
    // macOS не шлёт keyup обычных клавиш при зажатом ⌘ — жмём и отпускаем сразу
    evQueue.push({t:'kb', k, d:1}, {t:'kb', k, d:0});
    flushNow();
    return;
  }
  pressed.add(k);
  evQueue.push({t:'kb', k, d:1});
  flushNow();
});
cv.addEventListener('keyup', e => {
  if (!inputEnabled) return;
  e.preventDefault();
  const single = e.key.length === 1;
  const k = single ? (physicalChar(e) || e.key) : mapKeyName(e);
  if (!pressed.has(k)) return;                  // txt/tap-события уже завершены
  pressed.delete(k);
  evQueue.push({t:'kb', k, d:0});
  flushNow();
});
window.addEventListener('blur', releaseAll);

async function clipSend() {
  try { const text = await navigator.clipboard.readText();
    ws.send(JSON.stringify({type:'clipboard_set', text})); } catch(_){}
}
function clipGet() { ws.send(JSON.stringify({type:'clipboard_get'})); }

const FILE_BASE = `http://${HOST}:${PORT}`;
let fileLimits = null;
function formatBytes(value) {
  const units = ['Б', 'КБ', 'МБ', 'ГБ', 'ТБ'];
  let size = Math.max(0, Number(value) || 0), unit = 0;
  while (size >= 1024 && unit < units.length - 1) { size /= 1024; unit++; }
  return `${size.toFixed(unit ? 1 : 0)} ${units[unit]}`;
}
async function fileApi(path, options={}) {
  const headers = new Headers(options.headers || {});
  headers.set('Authorization', 'Bearer ' + TOKEN);
  const response = await fetch(FILE_BASE + path, {...options, headers});
  if (!response.ok) throw new Error(await response.text());
  return response;
}
function fileAction(text, className, handler) {
  const button = document.createElement('button');
  button.textContent = text;
  button.className = className;
  button.addEventListener('click', handler);
  return button;
}
async function openFiles() {
  if (!permissions.files) return;
  exitCapture();
  $('#dlgFiles').showModal();
  await loadFiles();
}
async function loadFiles() {
  const state = $('#fileState');
  state.textContent = 'Загрузка…';
  try {
    const data = await (await fileApi('/api/files')).json();
    fileLimits = data;
    $('#fileUsage').textContent = `${formatBytes(data.used)} из ${formatBytes(data.quota)}`;
    const body = $('#fileTable tbody');
    body.replaceChildren();
    for (const file of data.files) {
      const row = document.createElement('tr');
      const name = document.createElement('td'); name.textContent = file.name;
      const size = document.createElement('td'); size.textContent = formatBytes(file.size);
      const modified = document.createElement('td');
      modified.textContent = new Date(file.modified * 1000).toLocaleString();
      const actions = document.createElement('td');
      actions.append(fileAction('Скачать', '', () => downloadFile(file.name)),
                     fileAction('Удалить', 'danger', () => deleteFile(file.name)));
      row.append(name, size, modified, actions);
      body.appendChild(row);
    }
    state.textContent = data.files.length ? '' : 'Файлов пока нет';
  } catch (error) {
    state.textContent = error.message;
  }
}
async function uploadFile() {
  const file = $('#fileInput').files[0], state = $('#fileState'), button = $('#btnUpload');
  if (!file) { state.textContent = 'Выберите файл'; return; }
  if (fileLimits && file.size > fileLimits.max_upload) {
    state.textContent = `Файл больше лимита ${formatBytes(fileLimits.max_upload)}`;
    return;
  }
  const form = new FormData(); form.append('file', file, file.name);
  button.disabled = true; state.textContent = `Загрузка ${file.name}…`;
  try {
    await fileApi('/api/files/upload', {method:'POST', body:form});
    $('#fileInput').value = '';
    await loadFiles();
  } catch (error) {
    state.textContent = error.message;
  } finally {
    button.disabled = false;
  }
}
async function downloadFile(name) {
  const state = $('#fileState');
  try {
    state.textContent = `Скачивание ${name}…`;
    const blob = await (await fileApi('/api/files/download/' + encodeURIComponent(name))).blob();
    const url = URL.createObjectURL(blob), link = document.createElement('a');
    link.href = url; link.download = name; link.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    state.textContent = '';
  } catch (error) {
    state.textContent = error.message;
  }
}
async function deleteFile(name) {
  if (!confirm(`Удалить «${name}»?`)) return;
  const state = $('#fileState');
  try {
    await fileApi('/api/files/delete', {method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name})});
    await loadFiles();
  } catch (error) {
    state.textContent = error.message;
  }
}
$('#dlgFiles').addEventListener('close', () => cv.focus());

connect();
</script>
