<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>App_Remote — сессия</title>
<style>
:root { --bg:#0a0d13; --fg:#e6e9f0; --acc:#4f8cff; --ok:#3ecf8e; --warn:#f5b545; --err:#f0564f; }
* { box-sizing:border-box; }
body { margin:0; background:#000; color:var(--fg); font:13px "Segoe UI",system-ui,sans-serif; overflow:hidden; }
#stage { position:fixed; inset:0; background:#000; }
canvas {
  width:100%; height:100%; display:block; object-fit:contain;
  outline:none; background:#000;
}
/* Курсор рисуем сами (в кадре его нет). В оконном режиме с вводом используется
   родной CSS-курсор нужной формы; при захвате мыши и в режиме просмотра —
   этот SVG-оверлей. */
#remoteCursor {
  position:fixed; left:0; top:0; z-index:18; pointer-events:none; display:none;
  filter:drop-shadow(0 1px 2px rgba(0,0,0,.6)); will-change:transform;
}
#remoteCursor.blocked { opacity:.5; }
#toolbar {
  position:fixed; top:0; left:50%; transform:translateX(-50%);
  display:flex; gap:6px; padding:6px 10px; background:rgba(14,17,23,.92);
  border:1px solid #2a3245; border-top:0; border-radius:0 0 10px 10px; z-index:20;
  transition:opacity .35s, transform .35s; align-items:center; flex-wrap:wrap; max-width:98vw;
}
#toolbar.hidden { opacity:0; transform:translateX(-50%) translateY(-85%); }
#toolbar.hidden:hover, #toolbar:hover { opacity:1; transform:translateX(-50%); }
button, select {
  background:#1e2534; color:var(--fg); border:1px solid #2a3245;
  border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer;
}
button.acc { background:var(--acc); border-color:var(--acc); }
button.on { background:var(--ok); border-color:var(--ok); color:#06210f; }
button.danger { background:var(--err); border-color:var(--err); }
#overlay {
  position:fixed; top:10px; left:10px; z-index:15; min-width:250px;
  background:rgba(10,13,19,.85); border:1px solid #2a3245; border-radius:10px;
  padding:10px 14px; font:11.5px/1.55 Consolas,monospace; display:none;
}
#overlay .sec { color:#8b93a7; margin-top:6px; font-weight:700; }
#overlay .w { color:var(--warn); }
#overlay .e { color:var(--err); }
#overlay b { color:var(--acc); font-weight:600; }
#hint {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:22;
  background:rgba(14,17,23,.92); border:1px solid #2a3245; border-radius:8px;
  padding:6px 14px; font-size:12px; display:none; pointer-events:none;
}
#msg {
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:10px; z-index:30; background:var(--bg); text-align:center;
}
.badge { padding:2px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.b-ok { background:rgba(62,207,142,.15); color:var(--ok); }
.b-acc { background:rgba(79,140,255,.15); color:var(--acc); }
</style>
</head>
<body>
<div id="msg"><h2 id="msgText">Подключение…</h2><div id="msgSub" style="color:#8b93a7;max-width:480px"></div></div>
<div id="stage" style="display:none"><canvas id="cv" tabindex="0"></canvas><div id="remoteCursor"></div></div>

<div id="toolbar" style="display:none">
  <button id="btnOverlay" class="acc" onclick="toggleOverlay()">📊 Оверлей</button>
  <select id="selProfile" onchange="applyProfile()" title="Профиль">
    <option value="office">Офис</option><option value="dev">Разработка</option>
    <option value="design">Дизайн</option><option value="video">Видео</option>
    <option value="game">Игры</option><option value="competitive">Соревн.</option>
    <option value="custom">Свой</option>
  </select>
  <select id="selFps" onchange="sendConfig()" title="FPS"><option>15</option><option>30</option><option>60</option><option>90</option><option>120</option><option>144</option></select>
  <select id="selQ" onchange="sendConfig()" title="Качество"><option value="40">Q40</option><option value="55">Q55</option><option value="70">Q70</option><option value="85">Q85</option></select>
  <select id="selScale" onchange="sendConfig()" title="Разрешение"><option value="1">100%</option><option value="0.75">75%</option><option value="0.5">50%</option></select>
  <button id="btnInput" onclick="toggleInput()">⌨️ Ввод: вкл</button>
  <button id="btnCapture" onclick="toggleCaptureMode()" title="Захват мыши: курсор не выходит за окно и не задевает меню/док Mac. Esc — освободить.">🔒 Захват</button>
  <button id="btnMac" onclick="toggleMac()" title="Раскладка Mac→Windows: клавиша ⌘ (Cmd) работает как Ctrl (⌘C = копировать и т.п.)">⌘→Ctrl</button>
  <button onclick="clipSend()" id="btnClipS" title="Отправить буфер обмена на хост">📋→</button>
  <button onclick="clipGet()" id="btnClipG" title="Получить буфер обмена хоста">→📋</button>
  <button id="btnFs" onclick="toggleFs()" title="Полноэкранный режим">⛶</button>
  <button class="danger" onclick="disconnect()">✕ Отключиться</button>
</div>

<div id="hint"></div>
<div id="overlay"></div>

<script>
const P = new URLSearchParams(location.search);
const HOST = P.get('host'), PORT = P.get('port'), TOKEN = P.get('token');
const $ = s => document.querySelector(s);
const cv = $('#cv'), ctx = cv.getContext('2d');
const remoteCursor = $('#remoteCursor');
const toolbar = $('#toolbar');
const clamp = v => v < 0 ? 0 : v > 1 ? 1 : v;

const IS_MAC = /Mac|iPhone|iPad/i.test(navigator.platform || '')
  || /Mac/i.test((navigator.userAgentData && navigator.userAgentData.platform) || '');

let ws, hello = null, lastStats = null;
let inputEnabled = true, overlayOn = true;
let permissions = {input:false, clipboard:false};
let captureMode = IS_MAC;   // клик по экрану захватывает мышь (актуально для Mac)
let captured = false;       // сейчас Pointer Lock активен
let macKeys = IS_MAC;       // Cmd -> Ctrl

// адаптивный курсор хоста
let hostCursorType = 'default', hostCursorVisible = true, hostCursorPos = {x:0, y:0};
let vx = 0.5, vy = 0.5;     // виртуальная позиция курсора (0..1 по картинке)

// метрики клиента
let frames = 0, fpsShown = 0, bytesAcc = 0, bitrate = 0;
let rtts = [], ping = 0, jitter = 0;
let decodeMs = 0, frameGapMs = 0, lastFrameT = 0;
let framesDropped = 0;

$('#selFps').value = P.get('fps') || '60';
$('#selQ').value = P.get('quality') || '70';
$('#selScale').value = P.get('scale') || '1';
$('#selProfile').value = P.get('profile') || 'dev';

// ------- SVG-курсоры для оверлея (захват / просмотр). hx,hy — «горячая точка».
const CURSORS = {
  'default':     {hx:2,  hy:2,  svg:'<svg width="20" height="24" viewBox="0 0 20 24"><path d="M2 2 L2 18 L6 14.5 L8.8 20.5 L11.4 19.3 L8.7 13.6 L13.5 13.6 Z" fill="#fff" stroke="#111" stroke-width="1.3" stroke-linejoin="round"/></svg>'},
  'text':        {hx:7,  hy:13, svg:'<svg width="14" height="26" viewBox="0 0 14 26"><g fill="none" stroke-linecap="round"><path d="M7 3 V23 M4 3 H10 M4 23 H10" stroke="#111" stroke-width="3.6"/><path d="M7 3 V23 M4 3 H10 M4 23 H10" stroke="#fff" stroke-width="1.6"/></g></svg>'},
  'pointer':     {hx:9,  hy:3,  svg:'<svg width="24" height="28" viewBox="0 0 24 28"><path d="M8 3 c-1.1 0-1.9 .9-1.9 2 V13 L4.7 12 c-.9-.7-2.2-.5-2.2 .8 0 .5 .2 .9 .6 1.3 l3.7 4.4 c1.1 1.4 2.3 2.3 4.5 2.3 h3 c2.1 0 3.6-1.5 3.6-3.6 V10 c0-.9-.7-1.6-1.6-1.6 -.3 0-.5 .1-.8 .2 -.1-.8-.7-1.4-1.6-1.4 -.4 0-.7 .1-1 .3 -.2-.8-.8-1.3-1.6-1.3 -.3 0-.6 .1-.9 .2 V5 C9.9 3.9 9.1 3 8 3 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'move':        {hx:14, hy:14, svg:'<svg width="28" height="28" viewBox="0 0 28 28"><path d="M14 2 L18 6 H15.2 V12.8 H22 V10 L26 14 L22 18 V15.2 H15.2 V22 H18 L14 26 L10 22 H12.8 V15.2 H6 V18 L2 14 L6 10 V12.8 H12.8 V6 H10 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'ew-resize':   {hx:14, hy:7,  svg:'<svg width="28" height="14" viewBox="0 0 28 14"><path d="M7 3 L2 7 L7 11 V8 H21 V11 L26 7 L21 3 V6 H7 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'ns-resize':   {hx:7,  hy:14, svg:'<svg width="14" height="28" viewBox="0 0 14 28"><path d="M3 7 L7 2 L11 7 H8 V21 H11 L7 26 L3 21 H6 V7 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'nwse-resize': {hx:12, hy:12, svg:'<svg width="24" height="24" viewBox="0 0 24 24"><path d="M4 4 H12 L9.2 6.8 L17.2 14.8 L20 12 V20 H12 L14.8 17.2 L6.8 9.2 L4 12 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'nesw-resize': {hx:12, hy:12, svg:'<svg width="24" height="24" viewBox="0 0 24 24"><path d="M20 4 H12 L14.8 6.8 L6.8 14.8 L4 12 V20 H12 L9.2 17.2 L17.2 9.2 L20 12 Z" fill="#fff" stroke="#111" stroke-width="1.2" stroke-linejoin="round"/></svg>'},
  'crosshair':   {hx:12, hy:12, svg:'<svg width="24" height="24" viewBox="0 0 24 24"><g fill="none" stroke-linecap="round"><path d="M12 2 V22 M2 12 H22" stroke="#111" stroke-width="3.4"/><path d="M12 2 V22 M2 12 H22" stroke="#fff" stroke-width="1.4"/></g></svg>'},
  'not-allowed': {hx:12, hy:12, svg:'<svg width="24" height="24" viewBox="0 0 24 24"><g fill="none"><circle cx="12" cy="12" r="9" stroke="#111" stroke-width="4.5"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="#111" stroke-width="4.5"/><circle cx="12" cy="12" r="9" stroke="#f0564f" stroke-width="2.6"/><line x1="5.6" y1="5.6" x2="18.4" y2="18.4" stroke="#f0564f" stroke-width="2.6"/></g></svg>'},
};
const CSS_CURSORS = new Set(['default','text','pointer','move','ew-resize','ns-resize',
  'nwse-resize','nesw-resize','not-allowed','crosshair','wait','progress','help','grab','grabbing']);
function cur(type) { return CURSORS[type] || CURSORS['default']; }
function cssCursor(type) { return CSS_CURSORS.has(type) ? type : 'default'; }

function connect() {
  ws = new WebSocket(`ws://${HOST}:${PORT}/ws/stream?token=${encodeURIComponent(TOKEN)}`);
  ws.binaryType = 'arraybuffer';
  ws.onopen = () => { sendConfig(); };
  ws.onmessage = onMsg;
  ws.onclose = e => showMsg('Сессия завершена', e.reason || 'Соединение закрыто хостом');
  ws.onerror = () => showMsg('Ошибка подключения',
    'Проверьте, что хост запущен, доступен по сети и брандмауэр разрешает порт ' + PORT);
}

function showMsg(t, sub) {
  $('#msg').style.display = ''; $('#stage').style.display = 'none';
  toolbar.style.display = 'none';
  $('#msgText').textContent = t; $('#msgSub').textContent = sub || '';
}
function hint(text) {
  const h = $('#hint');
  if (!text) { h.style.display = 'none'; return; }
  h.textContent = text; h.style.display = '';
}

// ---- декодирование: держим только самый свежий кадр, старые отбрасываем.
let pendingFrame = null, decoding = false;
function onMsg(e) {
  if (typeof e.data === 'string') { onText(JSON.parse(e.data)); return; }
  bytesAcc += e.data.byteLength;
  if (pendingFrame) framesDropped++;
  pendingFrame = e.data;
  if (!decoding) drainFrames();
}
async function drainFrames() {
  decoding = true;
  while (pendingFrame) {
    const buf = pendingFrame; pendingFrame = null;
    const t0 = performance.now();
    try {
      const bmp = await createImageBitmap(new Blob([buf], {type:'image/jpeg'}));
      if (cv.width !== bmp.width || cv.height !== bmp.height) { cv.width = bmp.width; cv.height = bmp.height; }
      ctx.drawImage(bmp, 0, 0);
      bmp.close();
      decodeMs = performance.now() - t0;
      if (lastFrameT) frameGapMs = t0 - lastFrameT;
      lastFrameT = t0;
      frames++;
    } catch(_) { framesDropped++; }
  }
  decoding = false;
}

async function onText(d) {
  if (d.type === 'hello') {
    hello = d;
    applyPermissions(d.permissions || {});
    document.title = `App_Remote — ${d.host_name}`;
    $('#msg').style.display = 'none';
    $('#stage').style.display = ''; toolbar.style.display = 'flex';
    $('#btnClipS').style.display = permissions.clipboard ? '' : 'none';
    $('#btnClipG').style.display = permissions.clipboard ? '' : 'none';
    updateCaptureButton(); updateMacButton();
    updateCursorMode();
    cv.focus();
    pokeToolbar();
    renderOverlay();
  } else if (d.type === 'pong') {
    const rtt = performance.now() - d.t;
    rtts.push(rtt); if (rtts.length > 20) rtts.shift();
    ping = rtts.reduce((a,b)=>a+b,0) / rtts.length;
    const mean = ping;
    jitter = Math.sqrt(rtts.reduce((a,b)=>a+(b-mean)**2,0) / rtts.length);
  } else if (d.type === 'stats') {
    lastStats = d;
    if (d.permissions) applyPermissions(d.permissions);
  } else if (d.type === 'cursor') {
    const c = d.cursor || {};
    if (c.type && c.type !== hostCursorType) { hostCursorType = c.type; updateCursorMode(); }
    if (typeof c.x === 'number') { hostCursorPos.x = c.x; hostCursorPos.y = c.y; }
    hostCursorVisible = c.visible !== false;
    // в режиме просмотра курсор ведёт хост — двигаем оверлей за ним
    if (!captured && !inputEnabled) updateCursorMode();
  } else if (d.type === 'clipboard') {
    try { await navigator.clipboard.writeText(d.text); } catch(_){}
  } else if (d.type === 'kick') {
    showMsg('Сессия завершена', d.reason);
  }
}

setInterval(() => {
  fpsShown = frames; frames = 0;
  bitrate = bytesAcc * 8 / 1e6; bytesAcc = 0;
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:'ping', t: performance.now()}));
  if (overlayOn) renderOverlay();
}, 1000);

function renderOverlay() {
  const ov = $('#overlay');
  ov.style.display = overlayOn ? '' : 'none';
  if (!overlayOn) return;
  const s = lastStats || {}, h = s.host || {}, sess = s.session || {};
  const route = s.route || (hello && hello.route) || '—';
  const routeCls = route === 'LAN Direct' ? 'b-ok' : 'b-acc';
  const warn = (s.warnings || []).map(w => `<div class="w">⚠ ${w}</div>`).join('');
  const inputWarn = permissions.input ? '' : `<div class="e">${inputReasonText()}</div>`;
  const inputLat = ping ? (ping / 2 + frameGapMs / 2).toFixed(0) : '—';
  const modeTxt = captured ? 'захват мыши' : (inputEnabled ? 'оконный' : 'просмотр');
  ov.innerHTML = `
    <span class="badge ${routeCls}">${route}</span> <b>${hello ? hello.host_name : ''}</b>
    <div class="sec">ПОТОК</div>
    FPS: <b>${fpsShown}</b> (цель ${s.fps_target ?? $('#selFps').value}) · frame time: <b>${frameGapMs.toFixed(1)} мс</b><br>
    Битрейт: <b>${bitrate.toFixed(1)} Мбит/с</b> · Кодек: <b>${s.codec || 'MJPEG'}</b> · Захват: <b>${s.capture === 'dxgi' ? 'DXGI (быстрый)' : s.capture === 'gdi' ? 'GDI' : '—'}</b><br>
    Разрешение: <b>${cv.width}×${cv.height}</b> · Статичный экран не передаётся<br>
    Профиль: <b>${sess.profile || $('#selProfile').value}</b> · Q${s.quality ?? '—'} · Режим: <b>${modeTxt}</b>
    <div class="sec">ЗАДЕРЖКИ</div>
    Ping: <b>${ping.toFixed(1)} мс</b> · Jitter: <b>${jitter.toFixed(1)} мс</b><br>
    Ввод (оценка): <b>~${inputLat} мс</b> · Декодирование: <b>${decodeMs.toFixed(1)} мс</b><br>
    Пропущено декодером: <b>${framesDropped}</b> <span style="color:#8b93a7">(показывается только самый свежий кадр)</span>
    <div class="sec">ХОСТ</div>
    CPU: <b>${h.cpu_percent ?? '—'}%</b> · RAM: <b>${h.ram_percent ?? '—'}%</b><br>
    GPU: <b>${h.gpu_percent ?? 'н/д'}%</b> · VRAM: <b>${h.vram_percent ?? 'н/д'}%</b>
    ${inputWarn}
    ${warn}`;
}

function toggleOverlay() { overlayOn = !overlayOn; renderOverlay(); }
function toggleInput() {
  if (!permissions.input) return;
  inputEnabled = !inputEnabled;
  if (!inputEnabled) exitCapture();
  updateInputButton();
  updateCursorMode();
}
function toggleFs() {
  if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
  else document.documentElement.requestFullscreen().catch(()=>{});
}
function disconnect() { exitCapture(); if (ws) ws.close(); showMsg('Отключено', 'Можно закрыть вкладку'); }

// -------- захват мыши (Pointer Lock): курсор не задевает меню/док Mac --------
function toggleCaptureMode() {
  captureMode = !captureMode;
  updateCaptureButton();
  if (captureMode && permissions.input && inputEnabled) enterCapture();
  else exitCapture();
}
function enterCapture() {
  if (!permissions.input || !inputEnabled) return;
  if (cv.requestPointerLock) cv.requestPointerLock();
}
function exitCapture() {
  if (document.pointerLockElement === cv && document.exitPointerLock) document.exitPointerLock();
}
document.addEventListener('pointerlockchange', () => {
  captured = document.pointerLockElement === cv;
  if (captured) { releaseAll(); hint('Мышь захвачена · Esc — освободить курсор'); }
  else { releaseAll(); hint(''); pokeToolbar(); }
  updateCursorMode();
});
function updateCaptureButton() {
  const b = $('#btnCapture');
  b.classList.toggle('on', captureMode);
  b.textContent = captureMode ? '🔒 Захват: вкл' : '🔓 Захват: выкл';
}
function toggleMac() { macKeys = !macKeys; updateMacButton(); releaseAll(); }
function updateMacButton() {
  const b = $('#btnMac');
  b.classList.toggle('on', macKeys);
  b.textContent = macKeys ? '⌘→Ctrl: вкл' : '⌘→Ctrl: выкл';
  b.title = macKeys ? 'Cmd работает как Ctrl (⌘C = копировать). Нажмите, чтобы отключить.'
                    : 'Клавиша ⌘ отправляется как Win. Нажмите, чтобы Cmd работал как Ctrl.';
}

function applyPermissions(next) {
  const hadInput = permissions.input;
  permissions = {...permissions, ...next};
  if (!hadInput && permissions.input) inputEnabled = true;
  updateInputButton();
  updateCursorMode();
}
function inputReasonText() {
  const r = permissions.input_reason;
  if (r === 'backend_unavailable') return 'Ввод недоступен: хост не может управлять мышью/клавиатурой. Проверьте pynput и разрешения ОС.';
  if (r === 'user_denied') return 'Ввод запрещён для этого пользователя. Включите право ввода на панели хоста.';
  return 'Ввод недоступен.';
}
function updateInputButton() {
  const btn = $('#btnInput');
  const capBtn = $('#btnCapture');
  if (!permissions.input) {
    inputEnabled = false;
    btn.textContent = permissions.input_reason === 'backend_unavailable' ? '⌨️ Ввод: недоступен' : '⌨️ Ввод: запрещён';
    btn.title = inputReasonText();
    btn.disabled = true;
    if (capBtn) capBtn.disabled = true;
  } else {
    btn.disabled = false;
    if (capBtn) capBtn.disabled = false;
    btn.title = permissions.work_only_mode ? 'Рабочий режим хоста включён, но ввод разрешён.' : '';
    btn.textContent = '⌨️ Ввод: ' + (inputEnabled ? 'вкл' : 'выкл');
  }
}

// -------- отрисовка курсора --------
function contentRect() {
  const r = cv.getBoundingClientRect();
  if (!cv.width || !cv.height || !r.width || !r.height) return {x:r.left, y:r.top, w:r.width||1, h:r.height||1};
  const ar = cv.width / cv.height, rr = r.width / r.height;
  if (rr > ar) { const h = r.height, w = h * ar; return {x: r.left + (r.width - w) / 2, y: r.top, w, h}; }
  const w = r.width, h = w / ar; return {x: r.left, y: r.top + (r.height - h) / 2, w, h};
}
function cursorClientPos() {
  const c = contentRect();
  if (captured || inputEnabled) return {x: c.x + vx * c.w, y: c.y + vy * c.h};
  // просмотр: позиция от хоста
  const nx = cv.width ? hostCursorPos.x / cv.width : 0.5;
  const ny = cv.height ? hostCursorPos.y / cv.height : 0.5;
  return {x: c.x + nx * c.w, y: c.y + ny * c.h};
}
function renderRemoteCursor() {
  const c = cur(hostCursorType);
  if (remoteCursor.dataset.type !== hostCursorType) {
    remoteCursor.innerHTML = c.svg; remoteCursor.dataset.type = hostCursorType;
  }
  const p = cursorClientPos();
  remoteCursor.style.transform = `translate(${p.x - c.hx}px, ${p.y - c.hy}px)`;
}
function updateCursorMode() {
  const blocked = !permissions.input || !inputEnabled;
  remoteCursor.classList.toggle('blocked', blocked && !captured);
  if (captured) {
    cv.style.cursor = 'none';
    remoteCursor.style.display = hostCursorVisible ? '' : 'none';
    renderRemoteCursor();
  } else if (inputEnabled) {
    // оконный режим: родной CSS-курсор нужной формы точно там, где мышь
    remoteCursor.style.display = 'none';
    cv.style.cursor = cssCursor(hostCursorType);
  } else {
    // просмотр: рисуем курсор хоста
    cv.style.cursor = 'none';
    remoteCursor.style.display = hostCursorVisible ? '' : 'none';
    renderRemoteCursor();
  }
}

function sendConfig() {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({type:'config', fps:+$('#selFps').value, quality:+$('#selQ').value,
    scale:+$('#selScale').value, profile:$('#selProfile').value}));
}
function applyProfile() {
  const map = {office:[30,55,1], dev:[30,70,1], design:[60,85,1], video:[60,70,1],
               game:[60,70,1], competitive:[120,40,0.75]};
  const m = map[$('#selProfile').value];
  if (m) { $('#selFps').value = m[0]; $('#selQ').value = m[1]; $('#selScale').value = m[2]; }
  sendConfig();
}

// автоскрытие тулбара
let tbTimer = null;
function pokeToolbar() {
  if (captured) return;
  toolbar.classList.remove('hidden');
  clearTimeout(tbTimer);
  tbTimer = setTimeout(() => toolbar.classList.add('hidden'), 2500);
}
document.addEventListener('mousemove', pokeToolbar);

// -------- ввод --------
let evQueue = [];
setInterval(() => {
  if (evQueue.length && ws && ws.readyState === 1 && inputEnabled) {
    ws.send(JSON.stringify({type:'input', events: evQueue}));
  }
  evQueue = [];
}, 16);

function pushMove(x, y) {
  vx = x; vy = y;
  const last = evQueue[evQueue.length - 1];
  if (last && last.t === 'mm') { last.x = x; last.y = y; }   // коалесцируем движения
  else evQueue.push({t:'mm', x, y});
}
function insideContent(e) {
  const c = contentRect();
  return e.clientX >= c.x && e.clientX <= c.x + c.w && e.clientY >= c.y && e.clientY <= c.y + c.h;
}
function normAbs(e) {
  const c = contentRect();
  return {x: clamp((e.clientX - c.x) / c.w), y: clamp((e.clientY - c.y) / c.h)};
}

cv.addEventListener('mousemove', e => {
  if (captured) {
    const c = contentRect();
    vx = clamp(vx + e.movementX / c.w);
    vy = clamp(vy + e.movementY / c.h);
    if (inputEnabled) pushMove(vx, vy);
    renderRemoteCursor();
  } else if (inputEnabled && insideContent(e)) {
    const p = normAbs(e);
    pushMove(p.x, p.y);
    updateCursorMode();   // держим родной курсор в актуальной форме
  }
});
cv.addEventListener('mousedown', e => {
  e.preventDefault(); cv.focus();
  if (inputEnabled) {
    if (!captured && insideContent(e)) { const p = normAbs(e); pushMove(p.x, p.y); }
    evQueue.push({t:'mb', b:e.button, d:1});
  }
  if (captureMode && !captured && permissions.input && inputEnabled) enterCapture();
});
cv.addEventListener('mouseup', e => {
  e.preventDefault();
  if (inputEnabled) evQueue.push({t:'mb', b:e.button, d:0});
});

// колесо: копим дробные дельты (трекпад Mac шлёт мелкие) и переводим в «щелчки»
let wheelAcc = 0;
cv.addEventListener('wheel', e => {
  e.preventDefault();
  if (!inputEnabled) return;
  let d = e.deltaY;
  if (e.deltaMode === 1) d *= 16;             // строки -> пиксели
  else if (e.deltaMode === 2) d *= (cv.height || 600);
  wheelAcc += d;
  const step = Math.trunc(wheelAcc / 40);
  if (step) { wheelAcc -= step * 40; evQueue.push({t:'wh', dy: step * 100}); }
}, {passive:false});
cv.addEventListener('contextmenu', e => e.preventDefault());

// клавиатура: Mac -> Windows раскладка модификаторов
const pressed = new Set();
function mapKeyName(e) {
  let k = e.key;
  if (macKeys && k === 'Meta') return 'Control';   // Cmd -> Ctrl (⌘C = Ctrl+C)
  return k;
}
function releaseAll() {
  for (const k of pressed) evQueue.push({t:'kb', k, d:0});
  pressed.clear();
}
cv.addEventListener('keydown', e => {
  if (!inputEnabled) return;
  if (captured && e.key === 'Escape') return;    // Esc освобождает курсор — не шлём
  e.preventDefault();
  const k = mapKeyName(e);
  pressed.add(k);
  evQueue.push({t:'kb', k, d:1});
});
cv.addEventListener('keyup', e => {
  if (!inputEnabled) return;
  if (captured && e.key === 'Escape') return;
  e.preventDefault();
  const k = mapKeyName(e);
  pressed.delete(k);
  evQueue.push({t:'kb', k, d:0});
});
window.addEventListener('blur', releaseAll);

async function clipSend() {
  try { const text = await navigator.clipboard.readText();
    ws.send(JSON.stringify({type:'clipboard_set', text})); } catch(_){}
}
function clipGet() { ws.send(JSON.stringify({type:'clipboard_get'})); }

connect();
</script>
